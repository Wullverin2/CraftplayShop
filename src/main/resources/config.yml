# CraftplayShop Hauptkonfiguration.
# Lizenz: Proprietär. Copyright Wullverin @ Craftplay.de.

settings:
  # Standardsprache des Plugins, wenn ein Spieler keine eigene Sprache gewählt hat.
  defaultLanguage: "de_DE"

  # Ersatzsprache, falls eine Übersetzung oder GUI-Datei fehlt.
  fallbackLanguage: "en_US"

  # Erlaubt Spielern, ihre Sprache selbst umzuschalten.
  allowPlayerLanguageSwitch: true

  # Aktiviert zusätzliche Debug-Ausgaben.
  debug: false

commands:
  # Hauptbefehl, den du für CraftplayShop verwenden möchtest.
  # In Phase 1 können die in plugin.yml registrierten Befehle genutzt werden:
  # "cshop", "shop" oder "craftplayshop".
  # Beispiel: "cshop" => /cshop admin editor
  pluginCommand: "cshop"

files:
  # Wenn true, ergänzt CraftplayShop beim Start und Reload vorhandene
  # config-, language- und gui-Dateien automatisch um fehlende neue Keys.
  # Bestehende Werte werden dabei nicht überschrieben.
  autoUpdateExisting: true

economy:
  # Wenn true, wird Vault benötigt. Fehlt Vault, deaktiviert sich das Plugin.
  requireVault: true

  # Symbol oder Name der Währung.
  currencySymbol: "Coins"

  # Format für Geldbeträge.
  format: "%amount% Coins"

database:
  # SQLITE oder MYSQL.
  type: "SQLITE"

  # Prefix für alle Datenbanktabellen.
  tablePrefix: "craftplay_shop_"

mysql:
  # MySQL/MariaDB Host.
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: ""
  useSSL: false

gui:
  # Aktiviert externe GUI-Dateien aus dem /gui Ordner.
  enabled: true

  # Erstellt fehlende GUI-Dateien aus Ressourcen.
  createMissingFiles: true

  # Nutzt fallbackLanguage, wenn GUI-Datei oder Key fehlt.
  useFallbackLanguage: true

  # Cache für GUI-Items.
  cacheGuiItems: true

  # Erlaubt Console Commands auf GUI-Buttons.
  allowConsoleCommands: true

  # Erlaubt Player Commands auf GUI-Buttons.
  allowPlayerCommands: true

  # Blockiert gefährliche Befehle.
  blockDangerousCommands: true

  blockedCommandPrefixes:
    - "op "
    - "deop "
    - "stop"
    - "restart"
    - "reload"

language:
  # Erstellt fehlende Sprachdateien.
  createMissingFiles: true

  # Spieler dürfen Sprache wechseln.
  playerSwitchEnabled: true

serverShop:
  enabled: true
  allowBuy: true
  allowSell: true
  defaultCurrency: "VAULT"

  # Standard-Itemvergleich für einfache ServerShop-Items.
  itemMatchMode: "MATERIAL_ONLY"

  amountSelection:
    # Wenn true, steht die Mengenauswahl für spätere GUI-Aktionen bereit.
    # Der normale Spieler-Klick im ServerShop nutzt standardmäßig das EconomyShopGUI-System:
    # Linksklick kauft 1, Shift-Linksklick kauft einen Stack, Rechtsklick verkauft 1,
    # Shift-Rechtsklick verkauft einen Stack.
    enabled: false

    # Vorgegebene Mengen für Kaufen und Verkaufen.
    amounts:
      - 1
      - 8
      - 16
      - 32
      - 64

    # Wenn true, können Spieler eine eigene Menge per Chat eingeben.
    allowCustomAmount: true

    # Maximale eigene Menge aus der Chat-Eingabe.
    maxCustomAmount: 64

  buyConfirmation:
    # Wenn true, müssen teure Käufe im ServerShop bestätigt werden.
    enabled: true

    # Ab welchem Gesamtpreis eine Bestätigungs-GUI angezeigt wird.
    threshold: 10000.0

  stock:
    # Intervall, in dem geänderter ServerShop-Stock gebündelt in die Datenbank geschrieben wird.
    # Beim Stoppen des Plugins wird zusätzlich synchron gespeichert.
    flushIntervalSeconds: 30

  sellProtection:
    # Blockiert ServerShop-Verkäufe aus dem Creative-Modus.
    blockCreative: true

    # Blockiert ServerShop-Verkäufe aus dem Spectator-Modus.
    blockSpectator: true

    # Blockiert den Verkauf beschädigter Items.
    # Wichtig bei MATERIAL_ONLY-Matching, damit abgenutzte Tools nicht wie neue Items verkauft werden.
    blockDamagedItems: true

  protection:
    worlds:
      # Wenn true, wird die Weltenliste unten ausgewertet.
      enabled: false

      # BLOCKLIST blockiert nur die genannten Welten.
      # ALLOWLIST erlaubt nur die genannten Welten.
      mode: "BLOCKLIST"

      # Weltname exakt wie im Server.
      list: []

    gameModes:
      # Wenn true, dürfen nur die unten genannten GameModes kaufen/verkaufen.
      enabled: true

      buyAllowed:
        - "SURVIVAL"
        - "ADVENTURE"

      sellAllowed:
        - "SURVIVAL"
        - "ADVENTURE"

adminShop:
  backups:
    # Erstellt vor Änderungen über den Ingame-Editor ein Backup der server_shop.yml.
    enabled: true

    # Unterordner im Plugin-Ordner für ServerShop-Backups.
    folder: "backups/server_shop"

    # Mindestabstand zwischen zwei automatischen Backups.
    # Verhindert Backup-Spam bei mehreren schnellen Preis- oder Sortierklicks.
    cooldownSeconds: 30

    # Maximale Anzahl gespeicherter ServerShop-Backups.
    maxFiles: 25

    # Anzahl der Backups, die /cshop admin backup list maximal im Chat anzeigt.
    listLimit: 8

sellCommands:
  sellHand: true
  sellAll: true
  sellInventoryGui: true

playerShops:
  enabled: true
  useGuiCreation: true

  # Itemvergleich für PlayerShop-Kisten.
  # EXACT prüft Material und ItemMeta, MATERIAL_ONLY nur das Material.
  itemMatchMode: "EXACT"

  creation:
    # Standard-Display-Typ für neu erstellte Kistenshops.
    # NONE, ITEM, GLASS_CASE, LARGE_ITEM oder ITEM_FRAME.
    defaultDisplayType: ITEM

    # Spieler können mit Shift-Linksklick auf eine Kiste einen Chat-Assistenten starten.
    chatCreationEnabled: true

    # Material für automatisch gesetzte Shop-Schilder.
    autoSignMaterial: OAK_WALL_SIGN

    # Material für automatische stehende Schilder, wenn oben auf eine Kiste geklickt wird.
    autoStandingSignMaterial: OAK_SIGN

    # Spieler können einen SELL-Kistenshop erstellen, indem sie ein Schild mit [shop]
    # neben eine Kiste setzen. Zeile 2 = Menge, Zeile 3 = Preis.
    signCreationEnabled: true

    # Erlaubte Marker in der ersten Schildzeile.
    signMarkers:
      - "[shop]"
      - "[cshop]"
      - "shop"
      - "sell"
      - "buy"
      - "ankaufen"

  sign:
    # Statusfarben und Statustexte für PlayerShop-Schilder.
    # Bei SELL-Shops ist ein Shop verfügbar, wenn genug passende Items in der Kiste liegen.
    # Bei BUY-Shops ist ein Shop verfügbar, wenn genug Platz in der Kiste ist und der Besitzer genug Geld hat.
    status:
      availableColor: "&a"
      unavailableColor: "&c"
      availableText: "Verfügbar"
      unavailableText: "Nicht verfügbar"

    statusRefresh:
      # Aktualisiert Shop-Schilder automatisch, wenn sich Kisteninhalte ändern.
      # Zusätzlich werden Inventarklicks, Inventar-Schließen und Hopper-Bewegungen sofort nachgezogen.
      enabled: true

      # Wie oft Shop-Schilder im Hintergrund geprüft werden.
      intervalTicks: 20

      # Maximal aktualisierte Schilder pro Durchlauf.
      maxSignsPerTick: 25

    # Verfügbare Schild-Platzhalter:
    # %action% = Verkaufen oder Ankaufen
    # %action_en% = Selling oder Buying
    # %type% = SELL oder BUY
    # %owner% = Shopbesitzer
    # %amount% = Menge pro Handel
    # %item% = Itemname oder Material
    # %price% = formatierter Preis
    # %stock% = vorhandene passende Items in der Kiste
    # %space% = freier Platz für passende Items in der Kiste
    # %status% = verfügbarer oder nicht verfügbarer Statustext
    # %available% = true oder false
    # %status_color% und %stock_color% = configured Statusfarbe
    # Alte [owner], [amount], [item], [price], [stock color] Platzhalter funktionieren weiterhin.
    sell:
      # Schildtext für SELL-Shops nach dem Erstellen.
      lines:
        - "%status_color%&l%action%"
        - "&f%amount%x %item%"
        - "&a%price%"
        - "&8%owner%"
    buy:
      # Schildtext für BUY-Shops, die Items von Spielern ankaufen.
      lines:
        - "%status_color%&l%action%"
        - "&f%amount%x %item%"
        - "&a%price%"
        - "&8%owner%"
    pending:
      # Schildtext, wenn der Spieler das Item nicht in der Hand hatte.
      lines:
        - "&6&l[shop]"
        - "&eItem fehlt"
        - "&7Mit Item klicken"
        - "&8%owner%"

  display:
    # Standard-Anzeige über neu erstellten Kistenshops.
    # NONE, ITEM, GLASS_CASE, LARGE_ITEM oder ITEM_FRAME.
    # Alias für ältere Configs. Neue Shops nutzen playerShops.creation.defaultDisplayType.
    defaultType: ITEM

    animation:
      item:
        # Wenn true, schweben ITEM-Displays leicht auf und ab und drehen sich.
        enabled: true

        # Wie oft die Animation aktualisiert wird.
        intervalTicks: 1

        # Clientseitige Interpolation der Display-Transformation.
        # Höhere Werte wirken weicher, reagieren aber etwas träger.
        interpolationTicks: 4

        # Maximale Höhe der Auf-/Ab-Bewegung in Blöcken.
        hoverAmplitude: 0.08

        # Geschwindigkeit der Auf-/Ab-Bewegung.
        hoverSpeed: 1.35

        # Drehgeschwindigkeit in Grad pro Tick.
        rotationDegreesPerTick: 1.5

        # Schutzwert, damit bei sehr vielen Shops nicht alle Displays in einem Tick bewegt werden.
        maxAnimatedDisplaysPerTick: 150

  cleanup:
    # Prüft regelmäßig, ob Kiste und Schild noch existieren.
    # Fehlende physische Shops werden aus Cache und Datenbank entfernt.
    enabled: true
    intervalSeconds: 60

  protection:
    # Blockiert das Öffnen fremder PlayerShop-Kisten.
    blockContainerOpenByOthers: true

    # Löscht einen PlayerShop automatisch, wenn Besitzer oder Admin Schild/Kiste abbauen.
    deleteShopOnOwnerBreak: true

  plotsquared:
    # Wenn PlotSquared vorhanden ist, werden PlayerShops innerhalb eines gelöschten Plots
    # automatisch aus Cache und Datenbank entfernt.
    deleteShopsOnPlotDelete: true

autoSellChest:
  enabled: false

  selling:
    mode: "BOTH"
    intervalSeconds: 10
    sellOnlyWhenOwnerOnline: false

  performance:
    scanIntervalSeconds: 10
    maxChestsPerTick: 5
    maxItemsPerScan: 2304
    processOnlyDirtyChests: true
    dirtyCooldownSeconds: 5
    asyncDatabaseLogging: true

  protection:
    protectContainer: true
    blockBreakingByOthers: true
    blockExplosionDamage: true
    blockHopperExtraction: true
    allowHopperInsertion: true

directTrade:
  enabled: false

  # Spieler können DirectTrade für sich selbst deaktivieren.
  allowPlayerToggle: true

  # Standardstatus für neue Spieler.
  defaultEnabledForPlayers: true

  # Wenn true, darf ein Spieler keine Anfragen erhalten, wenn er DirectTrade deaktiviert hat.
  blockRequestsWhenDisabled: true

  # Wenn true, darf ein Spieler keine Anfragen senden, wenn er DirectTrade deaktiviert hat.
  blockSendingWhenDisabled: true

  request:
    timeoutSeconds: 30
    cooldownSeconds: 10
    requireSameWorld: true
    maxDistance: 10.0

  confirmation:
    requireReady: true
    requireFinalConfirm: true
    resetReadyOnChange: true

  money:
    enabled: true
    minAmount: 1.0
    maxAmount: 1000000.0

rankShop:
  enabled: false

permissionShop:
  enabled: false

referral:
  enabled: false

auctionHouse:
  enabled: false

integrations:
  placeholderApi:
    enabled: true

  headDatabase:
    enabled: true
    fallbackMaterial: PLAYER_HEAD
    warnIfMissing: true

  floodgate:
    enabled: true

  discord:
    enabled: false

protection:
  worldguard: true
  plotsquared: true
  lands: true
  bentobox: true

performance:
  asyncDatabaseLogging: true
  guiCacheEnabled: true
  maxGuiBuildsPerTick: 10

panel:
  # Eindeutige ID dieses Minecraft-Servers für das externe Team Panel.
  # Im Panel muss dieselbe ID bei der CraftplayShop-Server-Konfiguration eingetragen werden.
  # Beispiel: "Testserver-1"
  serverId: "change-this-server-id"

  # Geheimer Token für spätere Panel-API-Zugriffe auf dieses Plugin.
  # Trage denselben Token im Panel bei diesem Server ein. IP und Port werden nur im Panel gepflegt.
  token: "change-this-token"
