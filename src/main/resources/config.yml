# CraftplayShop Hauptkonfiguration.
# Lizenz: Proprietär. Copyright Wullverin @ Craftplay.de.

settings:
  # Standardsprache des Plugins, wenn ein Spieler keine eigene Sprache gewählt hat.
  defaultLanguage: "de_DE"

  # Ersatzsprache, falls eine Übersetzung oder GUI-Datei fehlt.
  fallbackLanguage: "en_US"

  # Erlaubt Spielern, ihre Sprache selbst umzuschalten.
  allowPlayerLanguageSwitch: true

  # Aktiviert zusätzliche Debug-Ausgaben.
  debug: false

commands:
  # Hauptbefehl, den du fuer CraftplayShop verwenden moechtest.
  # In Phase 1 koennen die in plugin.yml registrierten Befehle genutzt werden:
  # "cshop", "shop" oder "craftplayshop".
  # Beispiel: "cshop" => /cshop admin editor
  pluginCommand: "cshop"

files:
  # Wenn true, ergaenzt CraftplayShop beim Start und Reload vorhandene
  # config-, language- und gui-Dateien automatisch um fehlende neue Keys.
  # Bestehende Werte werden dabei nicht ueberschrieben.
  autoUpdateExisting: true

economy:
  # Wenn true, wird Vault benötigt. Fehlt Vault, deaktiviert sich das Plugin.
  requireVault: true

  # Symbol oder Name der Währung.
  currencySymbol: "Coins"

  # Format für Geldbeträge.
  format: "%amount% Coins"

database:
  # SQLITE oder MYSQL.
  type: "SQLITE"

  # Prefix für alle Datenbanktabellen.
  tablePrefix: "craftplay_shop_"

mysql:
  # MySQL/MariaDB Host.
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: ""
  useSSL: false

gui:
  # Aktiviert externe GUI-Dateien aus dem /gui Ordner.
  enabled: true

  # Erstellt fehlende GUI-Dateien aus Ressourcen.
  createMissingFiles: true

  # Nutzt fallbackLanguage, wenn GUI-Datei oder Key fehlt.
  useFallbackLanguage: true

  # Cache für GUI-Items.
  cacheGuiItems: true

  # Erlaubt Console Commands auf GUI-Buttons.
  allowConsoleCommands: true

  # Erlaubt Player Commands auf GUI-Buttons.
  allowPlayerCommands: true

  # Blockiert gefährliche Befehle.
  blockDangerousCommands: true

  blockedCommandPrefixes:
    - "op "
    - "deop "
    - "stop"
    - "restart"
    - "reload"

language:
  # Erstellt fehlende Sprachdateien.
  createMissingFiles: true

  # Spieler dürfen Sprache wechseln.
  playerSwitchEnabled: true

serverShop:
  enabled: true
  allowBuy: true
  allowSell: true
  defaultCurrency: "VAULT"

  # Standard-Itemvergleich für einfache ServerShop-Items.
  itemMatchMode: "MATERIAL_ONLY"

  amountSelection:
    # Wenn true, oeffnet ein Klick auf ein ServerShop-Item zuerst eine Mengenauswahl.
    enabled: true

    # Vorgegebene Mengen fuer Kaufen und Verkaufen.
    amounts:
      - 1
      - 8
      - 16
      - 32
      - 64

    # Wenn true, koennen Spieler eine eigene Menge per Chat eingeben.
    allowCustomAmount: true

    # Maximale eigene Menge aus der Chat-Eingabe.
    maxCustomAmount: 64

  buyConfirmation:
    # Wenn true, muessen teure Kaeufe im ServerShop bestaetigt werden.
    enabled: true

    # Ab welchem Gesamtpreis eine Bestaetigungs-GUI angezeigt wird.
    threshold: 10000.0

  stock:
    # Intervall, in dem geaenderter ServerShop-Stock gebuendelt in die Datenbank geschrieben wird.
    # Beim Stoppen des Plugins wird zusaetzlich synchron gespeichert.
    flushIntervalSeconds: 30

  sellProtection:
    # Blockiert ServerShop-Verkaeufe aus dem Creative-Modus.
    blockCreative: true

    # Blockiert ServerShop-Verkaeufe aus dem Spectator-Modus.
    blockSpectator: true

    # Blockiert den Verkauf beschaedigter Items.
    # Wichtig bei MATERIAL_ONLY-Matching, damit abgenutzte Tools nicht wie neue Items verkauft werden.
    blockDamagedItems: true

  protection:
    worlds:
      # Wenn true, wird die Weltenliste unten ausgewertet.
      enabled: false

      # BLOCKLIST blockiert nur die genannten Welten.
      # ALLOWLIST erlaubt nur die genannten Welten.
      mode: "BLOCKLIST"

      # Weltname exakt wie im Server.
      list: []

    gameModes:
      # Wenn true, duerfen nur die unten genannten GameModes kaufen/verkaufen.
      enabled: true

      buyAllowed:
        - "SURVIVAL"
        - "ADVENTURE"

      sellAllowed:
        - "SURVIVAL"
        - "ADVENTURE"

adminShop:
  backups:
    # Erstellt vor Aenderungen ueber den Ingame-Editor ein Backup der server_shop.yml.
    enabled: true

    # Unterordner im Plugin-Ordner fuer ServerShop-Backups.
    folder: "backups/server_shop"

    # Mindestabstand zwischen zwei automatischen Backups.
    # Verhindert Backup-Spam bei mehreren schnellen Preis- oder Sortierklicks.
    cooldownSeconds: 30

    # Maximale Anzahl gespeicherter ServerShop-Backups.
    maxFiles: 25

    # Anzahl der Backups, die /cshop admin backup list maximal im Chat anzeigt.
    listLimit: 8

sellCommands:
  sellHand: true
  sellAll: true
  sellInventoryGui: true

playerShops:
  enabled: false
  useGuiCreation: true

autoSellChest:
  enabled: false

  selling:
    mode: "BOTH"
    intervalSeconds: 10
    sellOnlyWhenOwnerOnline: false

  performance:
    scanIntervalSeconds: 10
    maxChestsPerTick: 5
    maxItemsPerScan: 2304
    processOnlyDirtyChests: true
    dirtyCooldownSeconds: 5
    asyncDatabaseLogging: true

  protection:
    protectContainer: true
    blockBreakingByOthers: true
    blockExplosionDamage: true
    blockHopperExtraction: true
    allowHopperInsertion: true

directTrade:
  enabled: false

  # Spieler können DirectTrade für sich selbst deaktivieren.
  allowPlayerToggle: true

  # Standardstatus für neue Spieler.
  defaultEnabledForPlayers: true

  # Wenn true, darf ein Spieler keine Anfragen erhalten, wenn er DirectTrade deaktiviert hat.
  blockRequestsWhenDisabled: true

  # Wenn true, darf ein Spieler keine Anfragen senden, wenn er DirectTrade deaktiviert hat.
  blockSendingWhenDisabled: true

  request:
    timeoutSeconds: 30
    cooldownSeconds: 10
    requireSameWorld: true
    maxDistance: 10.0

  confirmation:
    requireReady: true
    requireFinalConfirm: true
    resetReadyOnChange: true

  money:
    enabled: true
    minAmount: 1.0
    maxAmount: 1000000.0

rankShop:
  enabled: false

permissionShop:
  enabled: false

referral:
  enabled: false

auctionHouse:
  enabled: false

integrations:
  placeholderApi:
    enabled: true

  headDatabase:
    enabled: true
    fallbackMaterial: PLAYER_HEAD
    warnIfMissing: true

  floodgate:
    enabled: true

  discord:
    enabled: false

protection:
  worldguard: true
  plotsquared: true
  lands: true
  bentobox: true

performance:
  asyncDatabaseLogging: true
  guiCacheEnabled: true
  maxGuiBuildsPerTick: 10

panel:
  # Eindeutige ID dieses Minecraft-Servers für das externe Team Panel.
  # Im Panel muss dieselbe ID bei der CraftplayShop-Server-Konfiguration eingetragen werden.
  # Beispiel: "Testserver-1"
  serverId: "change-this-server-id"

  # Geheimer Token für spätere Panel-API-Zugriffe auf dieses Plugin.
  # Trage denselben Token im Panel bei diesem Server ein. IP und Port werden nur im Panel gepflegt.
  token: "change-this-token"
