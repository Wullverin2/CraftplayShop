home:
  title: "&8AuctionHouse"
  size: 27
  buttons:
    browse:
      enabled: true
      slot: 11
      material: CHEST
      name: "&6Browse Listings"
      lore:
        - "&7Browse all active"
        - "&7AuctionHouse offers."
        - ""
        - "&eClick to open"
      leftClickActions:
        - "AUCTIONHOUSE_BROWSE"
    sell:
      enabled: true
      slot: 13
      material: GOLD_INGOT
      name: "&eList Held Item"
      lore:
        - "&7Use the item in your hand"
        - "&7with the default config price."
        - ""
        - "&7Exact: &e/ah sell <price> [amount]"
        - "&eClick to list"
      leftClickActions:
        - "AUCTIONHOUSE_SELL_HAND"
    mine:
      enabled: true
      slot: 15
      material: BOOK
      name: "&bMy Listings"
      lore:
        - "&7Manage your active"
        - "&7and cancelled offers."
        - ""
        - "&eClick to open"
      leftClickActions:
        - "AUCTIONHOUSE_MINE"
    claims:
      enabled: true
      slot: 16
      material: HOPPER
      name: "&aClaims"
      lore:
        - "&7Claim cancelled or"
        - "&7expired listings."
        - ""
        - "&eClick to open"
      leftClickActions:
        - "AUCTIONHOUSE_CLAIMS"
    search:
      enabled: true
      slot: 10
      material: COMPASS
      name: "&dSearch"
      lore:
        - "&7Search by chat for"
        - "&7material, item or seller."
        - ""
        - "&eClick to start"
      leftClickActions:
        - "AUCTIONHOUSE_SEARCH"

