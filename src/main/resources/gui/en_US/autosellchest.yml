  chestItem:
    material: CHEST
    name: "&cAutoSellChest #%id%"
    lore:
      - "&7Status: %status%"
      - "&7World: &f%world%"
      - "&7Position: &f%x% %y% %z%"
      - "&7Interval: &f%interval_seconds%s &8(%interval_name%&8)"
      - "&7Multiplier: &fx%multiplier% &8(%multiplier_name%&8)"
      - "&7Sold: &f%total_items% items"
      - "&7Earned: &f%total_money%"
