info:
  title: "&8AutoSellChest #%id%"
  size: 27

  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "
    slots: [0,1,2,3,4,5,6,7,8,18,19,20,21,22,23,24,25,26]

  items:
    status:
      enabled: true
      slot: 11
      material: CHEST
      name: "&cAutoSellChest #%id%"
      lore:
        - "&7Status: %status%"
        - "&7Owner: &f%owner%"
        - "&7Owner online: %owner_online%"
        - "&7Position: &f%world% %x% %y% %z%"
        - "&7Interval: &f%interval_seconds%s &8(%interval_name%&8)"
        - "&7Multiplier: &fx%multiplier%"
        - "&7Sold: &f%total_items% items"
        - "&7Earned: &f%total_money%"
      action: none
    toggle:
      enabled: true
      slot: 12
      material: LEVER
      name: "&eToggle active"
      lore:
        - "&7Current status: %status%"
      action: toggle
    notify:
      enabled: true
      slot: 21
      material: BELL
      name: "&eOwner notifications"
      lore:
        - "&7Status: %notify_status%"
        - "&7Mode: &f%notify_mode%"
        - "&7Processor: &f%notify_processor_status%"
      action: notify
    upgrades:
      enabled: true
      slot: 14
      material: ANVIL
      name: "&bUpgrades"
      lore:
        - "&7Interval: &f%interval_name%"
        - "&7Multiplier: &f%multiplier_name%"
        - ""
        - "&eClick to open"
      action: upgrades
    stats:
      enabled: true
      slot: 15
      material: BOOK
      name: "&eStatistics"
      lore:
        - "&7Debug: &f%debug%"
        - "&7Today: &f%today_items% items"
        - ""
        - "&eClick to open"
      action: stats
    trust:
      enabled: true
      slot: 13
      material: PLAYER_HEAD
      name: "&bTrust"
      lore:
        - "&7Manage player access."
        - ""
        - "&eClick to open"
      action: trust
    admin:
      enabled: true
      slot: 10
      material: COMMAND_BLOCK
      name: "&cAdmin Management"
      lore:
        - "&7Change owner, name, status"
        - "&7and upgrade levels directly."
      action: admin_manage
    teleport:
      enabled: true
      slot: 16
      material: ENDER_PEARL
      name: "&aTeleport to chest"
      action: teleport
    delete:
      enabled: true
      slot: 22
      material: TNT
      name: "&cDelete AutoSellChest"
      lore:
        - "&7Only deletes the database entry."
      action: delete

  buttons:
    back:
      enabled: true
      slot: 18
      material: ARROW
      name: "&eBack"
      action: back
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "&cClose"
      action: close

