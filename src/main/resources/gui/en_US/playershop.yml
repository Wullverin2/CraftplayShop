home:
  title: "&8Player Shops"
  size: 27
  buttons:
    allShops:
      enabled: true
      slot: 11
      material: CHEST
      name: "&aAll Shops"
      lore:
        - "&7Shows all active player shops."
        - ""
        - "&eClick to open"
    ownShops:
      enabled: true
      slot: 13
      material: PLAYER_HEAD
      name: "&eMy Shops"
      lore:
        - "&7Manage your own shops."
        - ""
        - "&eClick to open"
    search:
      enabled: true
      slot: 15
      material: COMPASS
      name: "&bSearch"
      lore:
        - "&7Search by item, material,"
        - "&7owner or shop type."
        - ""
        - "&eClick to search"
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "&cClose"
      lore: []

list:
  allTitle: "&8All Player Shops %page%/%pages%"
  ownTitle: "&8My Player Shops %page%/%pages%"
  searchTitle: "&8Player Shop Search: %query% %page%/%pages%"
  size: 54
  shopSlots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
  buttons:
    back:
      enabled: true
      slot: 45
      material: ARROW
      name: "&eBack"
      lore: []
    search:
      enabled: true
      slot: 49
      material: COMPASS
      name: "&bSearch"
      lore:
        - "&7Start a new search."
    ownShops:
      enabled: true
      slot: 53
      material: PLAYER_HEAD
      name: "&eMy Shops"
      lore:
        - "&7Shows your shops."
    previous:
      enabled: true
      slot: 48
      material: ARROW
      name: "&ePrevious Page"
      lore:
        - "&7Page &f%page%&7/&f%pages%"
    next:
      enabled: true
      slot: 50
      material: ARROW
      name: "&eNext Page"
      lore:
        - "&7Page &f%page%&7/&f%pages%"
  emptyItem:
    slot: 22
    material: BARRIER
    name: "&cNo shops found"
    lore:
      - "&7No matching shops were found."
  shopItem:
    name: "&e%item%"
    lore:
      - "&7Type: &f%type_en%"
      - "&7Owner: &f%owner%"
      - "&7Amount: &e%amount%"
      - "&7Price: &a%price%"
      - "&7In chest: &e%stock%"
      - "&7Coordinates: &f%world% %x% %y% %z%"
      - "&7Display: &f%display_type%"
      - ""
      - "&eLeft click &7Edit"
      - "&eRight click &7Teleport to sign"
      - "&eShift-left click &7Confirm deletion"
      - "&7Combo shops: &fRight click buys, left click sells"

deleteConfirm:
  title: "&8Delete shop?"
  size: 27
  slots:
    confirm: 11
    preview: 13
    cancel: 15
  items:
    confirm:
      material: REDSTONE_BLOCK
      name: "&cDelete shop"
      lore:
        - "&7Item: &f%item%"
        - "&7Owner: &f%owner%"
        - "&7Coordinates: &f%world% %x% %y% %z%"
        - ""
        - "&cClick to delete permanently"
    cancel:
      material: EMERALD_BLOCK
      name: "&aCancel"
      lore:
        - "&7Back to shop list."

edit:
  title: "&8Edit ChestShop"
  size: 27
  slots:
    item: 11
    amount: 13
    price: 15
    display: 22
    close: 26
  items:
    item:
      name: "&e%item%"
      lore:
        - "&7ID: &f%id%"
        - "&7Material: &f%material%"
        - "&7Owner: &f%owner%"
        - ""
        - "&eClick with an item on your cursor"
        - "&eor in your hand to change the shop item."
    amount:
      material: CLOCK
      name: "&eAmount"
      lore:
        - "&7Current: &e%amount%"
        - ""
        - "&aLeft click: +1"
        - "&aShift-left click: +10"
        - "&cRight click: -1"
        - "&cShift-right click: -10"
    price:
      material: EMERALD
      name: "&aPrice"
      lore:
        - "&7Current: &e%price%"
        - ""
        - "&aLeft click: +1"
        - "&aShift-left click: +10"
        - "&cRight click: -1"
        - "&cShift-right click: -10"
    display:
      material: ITEM_FRAME
      name: "&bDisplay"
      lore:
        - "&7Current: &e%display_type%"
        - ""
        - "&eClick to switch"
    close:
      material: BARRIER
      name: "&cClose"
      lore: []
