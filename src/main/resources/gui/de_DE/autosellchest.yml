list:
  title: "&8AutoSellChests"
  size: 54

  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "
    slots: [0,1,2,3,4,5,6,7,8,45,46,47,48,49,50,51,52,53]

  chestSlots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34]

  chestItem:
    material: CHEST
    name: "&cAutoSellChest #%id%"
    lore:
      - "&7Status: %status%"
      - "&7Welt: &f%world%"
      - "&7Position: &f%x% %y% %z%"
      - "&7Intervall: &f%interval_seconds%s &8(%interval_name%&8)"
      - "&7Multiplikator: &fx%multiplier% &8(%multiplier_name%&8)"
      - "&7Verkauft: &f%total_items% Items"
      - "&7Verdient: &f%total_money%"
      - ""
      - "&eLinksklick: Details"
      - "&eRechtsklick: Teleport"
      - "&cShift-Linksklick: Löschen"

  buttons:
    close:
      enabled: true
      slot: 49
      material: BARRIER
      name: "&cSchließen"
      action: close

info:
  title: "&8AutoSellChest #%id%"
  size: 27

  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "
    slots: [0,1,2,3,4,5,6,7,8,18,19,20,21,22,23,24,25,26]

  items:
    status:
      enabled: true
      slot: 11
      material: CHEST
      name: "&cAutoSellChest #%id%"
      lore:
        - "&7Status: %status%"
        - "&7Besitzer: &f%owner%"
        - "&7Position: &f%world% %x% %y% %z%"
        - "&7Intervall: &f%interval_seconds%s &8(%interval_name%&8)"
        - "&7Multiplikator: &fx%multiplier%"
        - "&7Verkauft: &f%total_items% Items"
        - "&7Verdient: &f%total_money%"
      action: none
    toggle:
      enabled: true
      slot: 12
      material: LEVER
      name: "&eAktiv umschalten"
      lore:
        - "&7Aktueller Status: %status%"
      action: toggle
    upgrades:
      enabled: true
      slot: 14
      material: ANVIL
      name: "&bUpgrades"
      lore:
        - "&7Intervall: &f%interval_name%"
        - "&7Multiplikator: &f%multiplier_name%"
        - ""
        - "&eKlicken zum Öffnen"
      action: upgrades
    teleport:
      enabled: true
      slot: 16
      material: ENDER_PEARL
      name: "&aZur Kiste teleportieren"
      action: teleport
    delete:
      enabled: true
      slot: 22
      material: TNT
      name: "&cAutoSellChest löschen"
      lore:
        - "&7Löscht nur den Datenbankeintrag."
      action: delete

  buttons:
    back:
      enabled: true
      slot: 18
      material: ARROW
      name: "&eZurück"
      action: back
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "&cSchließen"
      action: close

upgrades:
