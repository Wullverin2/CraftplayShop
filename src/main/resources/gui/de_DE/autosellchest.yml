        - "&eKlicken zum Öffnen"
      action: stats
    trust:
      enabled: true
      slot: 13
      material: PLAYER_HEAD
      name: "&bTrust"
      lore:
        - "&7Spielerzugriff verwalten."
        - ""
        - "&eKlicken zum Öffnen"
      action: trust
    admin:
      enabled: true
      slot: 10
      material: COMMAND_BLOCK
      name: "&cAdmin-Verwaltung"
      lore:
        - "&7Besitzer, Name, Status und"
        - "&7Upgrade-Level direkt ändern."
      action: admin_manage
    teleport:
      enabled: true
      slot: 16
      material: ENDER_PEARL
      name: "&aZur Kiste teleportieren"
      action: teleport
    delete:
      enabled: true
      slot: 22
      material: TNT
      name: "&cAutoSellChest löschen"
      lore:
        - "&7Löscht nur den Datenbankeintrag."
      action: delete

  buttons:
    back:
      enabled: true
      slot: 18
      material: ARROW
      name: "&eZurück"
      action: back
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "&cSchließen"
      action: close

