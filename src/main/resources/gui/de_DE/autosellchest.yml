        - "&eKlicken zum Öffnen"
      action: upgrades
    stats:
      enabled: true
      slot: 15
      material: BOOK
      name: "&eStatistiken"
      lore:
        - "&7Debug: &f%debug%"
        - "&7Heute: &f%today_items% Items"
