  items:
    interval:
      enabled: true
      slot: 11
      material: CLOCK
      name: "&aIntervall-Upgrade"
      lore:
        - "&7Aktuell: &f%interval_name%"
        - "&7Aktuelles Intervall: &f%interval_seconds%s"
        - ""
        - "&7Nächstes Upgrade: &e%next_interval_name%"
