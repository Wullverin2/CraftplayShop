        - "&eKlicken zum Kaufen"
      action: upgrade_multiplier

  buttons:
    back:
      enabled: true
      slot: 18
      material: ARROW
      name: "&eZurück"
      action: back
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "&cSchließen"
      action: close

deleteConfirm:
