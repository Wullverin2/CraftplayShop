      lore:
        - "&7Status: %status%"
        - "&7Besitzer: &f%owner%"
        - "&7Owner online: %owner_online%"
        - "&7Position: &f%world% %x% %y% %z%"
        - "&7Intervall: &f%interval_seconds%s &8(%interval_name%&8)"
        - "&7Multiplikator: &fx%multiplier%"
        - "&7Verkauft: &f%total_items% Items"
        - "&7Verdient: &f%total_money%"
