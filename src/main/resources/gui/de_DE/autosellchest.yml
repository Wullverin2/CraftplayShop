    toggle:
      enabled: true
      slot: 12
      material: LEVER
      name: "&eAktiv umschalten"
      lore:
        - "&7Aktueller Status: %status%"
      action: toggle
    notify:
      enabled: true
      slot: 21
      material: BELL
      name: "&eBesitzer-Benachrichtigung"
      lore:
        - "&7Status: %notify_status%"
        - "&7Modus: &f%notify_mode%"
        - "&7Processor: &f%notify_processor_status%"
      action: notify
    upgrades:
      enabled: true
      slot: 14
      material: ANVIL
      name: "&bUpgrades"
      lore:
        - "&7Intervall: &f%interval_name%"
        - "&7Multiplikator: &f%multiplier_name%"
