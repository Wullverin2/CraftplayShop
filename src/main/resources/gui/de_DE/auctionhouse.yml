home:
  title: "&8Auktionshaus"
  size: 27
  buttons:
    browse:
      enabled: true
      slot: 11
      material: CHEST
      name: "&6Alle Listings"
      lore:
        - "&7Durchsuche alle aktiven"
        - "&7Angebote im Auktionshaus."
        - ""
        - "&eKlicken zum Oeffnen"
      leftClickActions:
        - "AUCTIONHOUSE_BROWSE"
    sell:
      enabled: true
      slot: 13
      material: GOLD_INGOT
      name: "&eMit Hand listen"
      lore:
        - "&7Nutze das Item in deiner Hand"
        - "&7mit dem Standardpreis aus der Config."
        - ""
        - "&7Genauer: &e/ah sell <preis> [menge]"
        - "&eKlicken zum Listen"
      leftClickActions:
        - "AUCTIONHOUSE_SELL_HAND"
    mine:
      enabled: true
      slot: 15
      material: BOOK
      name: "&bMeine Listings"
      lore:
        - "&7Verwalte deine aktiven"
        - "&7und abgebrochenen Angebote."
        - ""
        - "&eKlicken zum Oeffnen"
      leftClickActions:
        - "AUCTIONHOUSE_MINE"
    claims:
      enabled: true
      slot: 16
      material: HOPPER
      name: "&aAbholen"
      lore:
        - "&7Hole abgebrochene oder"
        - "&7abgelaufene Listings ab."
        - ""
        - "&eKlicken zum Oeffnen"
      leftClickActions:
        - "AUCTIONHOUSE_CLAIMS"
    search:
      enabled: true
      slot: 10
      material: COMPASS
      name: "&dSuche"
      lore:
        - "&7Suche per Chat nach"
        - "&7Material, Item oder Verkaeufer."
        - ""
        - "&eKlicken zum Starten"
      leftClickActions:
        - "AUCTIONHOUSE_SEARCH"

