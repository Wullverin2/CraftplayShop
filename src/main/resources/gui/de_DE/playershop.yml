home:
  title: "&8Spielershops"
  size: 27
  buttons:
    allShops:
      enabled: true
      slot: 11
      material: CHEST
      name: "&aAlle Shops"
      lore:
        - "&7Zeigt alle aktiven Spielershops."
        - ""
        - "&eKlicken zum Öffnen"
    ownShops:
      enabled: true
      slot: 13
      material: PLAYER_HEAD
      name: "&eMeine Shops"
      lore:
        - "&7Verwalte deine eigenen Shops."
        - ""
        - "&eKlicken zum Öffnen"
    search:
      enabled: true
      slot: 15
      material: COMPASS
      name: "&bSuche"
      lore:
        - "&7Suche nach Item, Material,"
        - "&7Besitzer oder Shop-Typ."
        - ""
        - "&eKlicken zum Suchen"
    close:
      enabled: true
      slot: 26
      material: BARRIER
      name: "&cSchließen"
      lore: []

list:
  allTitle: "&8Alle Spielershops %page%/%pages%"
  ownTitle: "&8Meine Spielershops %page%/%pages%"
  searchTitle: "&8Spielershop Suche: %query% %page%/%pages%"
  size: 54
  shopSlots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
  buttons:
    back:
      enabled: true
      slot: 45
      material: ARROW
      name: "&eZurück"
      lore: []
    search:
      enabled: true
      slot: 49
      material: COMPASS
      name: "&bSuche"
      lore:
        - "&7Neue Suche starten."
    ownShops:
      enabled: true
      slot: 53
      material: PLAYER_HEAD
      name: "&eMeine Shops"
      lore:
        - "&7Zeigt deine Shops."
    previous:
      enabled: true
      slot: 48
      material: ARROW
      name: "&eVorherige Seite"
      lore:
        - "&7Seite &f%page%&7/&f%pages%"
    next:
      enabled: true
      slot: 50
      material: ARROW
      name: "&eNächste Seite"
      lore:
        - "&7Seite &f%page%&7/&f%pages%"
  emptyItem:
    slot: 22
    material: BARRIER
    name: "&cKeine Shops gefunden"
    lore:
      - "&7Es wurden keine passenden Shops gefunden."
  shopItem:
    name: "&e%item%"
    lore:
      - "&7Typ: &f%type%"
      - "&7Besitzer: &f%owner%"
      - "&7Menge: &e%amount%"
      - "&7Preis: &a%price%"
      - "&7In Kiste: &e%stock%"
      - "&7Koordinaten: &f%world% %x% %y% %z%"
      - "&7Anzeige: &f%display_type%"
      - ""
      - "&eLinksklick &7Bearbeiten"
      - "&eRechtsklick &7Zum Schild teleportieren"
      - "&eShift-Linksklick &7Löschen bestätigen"
      - "&7Kombi-Shops: &fRechtsklick kaufen, Linksklick verkaufen"

deleteConfirm:
  title: "&8Shop löschen?"
  size: 27
  slots:
    confirm: 11
    preview: 13
    cancel: 15
  items:
    confirm:
      material: REDSTONE_BLOCK
      name: "&cShop löschen"
      lore:
        - "&7Item: &f%item%"
        - "&7Besitzer: &f%owner%"
        - "&7Koordinaten: &f%world% %x% %y% %z%"
        - ""
        - "&cKlicken zum endgültigen Löschen"
    cancel:
      material: EMERALD_BLOCK
      name: "&aAbbrechen"
      lore:
        - "&7Zurück zur Shopliste."

edit:
  title: "&8Kistenshop bearbeiten"
  size: 27
  slots:
    item: 11
    amount: 13
    price: 15
    display: 22
    close: 26
  items:
    item:
      name: "&e%item%"
      lore:
        - "&7ID: &f%id%"
        - "&7Material: &f%material%"
        - "&7Besitzer: &f%owner%"
        - ""
        - "&eKlicke mit einem Item am Cursor"
        - "&eoder in der Hand, um das Shop-Item zu ändern."
    amount:
      material: CLOCK
      name: "&eMenge"
      lore:
        - "&7Aktuell: &e%amount%"
        - ""
        - "&aLinksklick: +1"
        - "&aShift-Linksklick: +10"
        - "&cRechtsklick: -1"
        - "&cShift-Rechtsklick: -10"
    price:
      material: EMERALD
      name: "&aPreis"
      lore:
        - "&7Aktuell: &e%price%"
        - ""
        - "&aLinksklick: +1"
        - "&aShift-Linksklick: +10"
        - "&cRechtsklick: -1"
        - "&cShift-Rechtsklick: -10"
    display:
      material: ITEM_FRAME
      name: "&bAnzeige"
      lore:
        - "&7Aktuell: &e%display_type%"
        - ""
        - "&eKlicken zum Wechseln"
    close:
      material: BARRIER
      name: "&cSchließen"
      lore: []
